<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOCZY | Login & Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f8fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      max-width: 420px;
      width: 100%;
      border-radius: 14px;
    }
    .brand {
      font-weight: 700;
      font-size: 28px;
      color: #0d6efd;
    }
  </style>
</head>
<body>

<div class="card auth-card shadow p-4">
  <div class="text-center mb-3">
    <div class="brand">DOCZY</div>
    <small class="text-muted">Doctor at your doorstep</small>
  </div>

  <!-- Django messages -->
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} text-center">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <!-- Tabs -->
  <ul class="nav nav-pills mb-3 justify-content-center">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login">
        Login
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="pill" data-bs-target="#register">
        Register
      </button>
    </li>
  </ul>

  <div class="tab-content">

    <!-- ================= LOGIN ================= -->
    <div class="tab-pane fade show active" id="login">
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="text" name="username" class="form-control"
                 placeholder="Enter email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control"
                 placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Login
        </button>
      </form>
    </div>

    <!-- ================= REGISTER ================= -->
    <div class="tab-pane fade" id="register">
      <form method="post" action="{% url 'register' %}">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control"
                 placeholder="Enter full name" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control"
                 placeholder="Enter email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control"
                 placeholder="Create password" required>
        </div>

        <button type="submit" class="btn btn-success w-100">
          Register
        </button>
      </form>
    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
