<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOCZY | Booking Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap (optional, for layout only) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #f4f8fb, #e9f1ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
    }

    .success-card {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
      animation: fadeInUp 0.8s ease;
    }

    /* Animated checkmark circle */
    .check-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #0d6efd;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: pop 0.6s ease;
    }

    .check-circle span {
      font-size: 46px;
      color: #ffffff;
      animation: tick 0.4s ease 0.4s forwards;
      opacity: 0;
    }

    h2 {
      font-weight: 700;
      margin-bottom: 10px;
      color: #212529;
    }

    p {
      color: #6c757d;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .btn-primary {
      border-radius: 30px;
      padding: 10px 24px;
      font-size: 15px;
    }

    .brand {
      margin-top: 15px;
      font-size: 13px;
      color: #adb5bd;
    }

    /* Animations */
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes tick {
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="success-card">

    <div class="check-circle">
      <span>✓</span>
    </div>

    <h2>Booking Successful!</h2>

    <p>
      Your doctor booking has been confirmed.<br>
      A verified doctor will contact you shortly and visit you at your doorstep.
    </p>

    <button class="btn btn-primary" onclick="goHome()">
      Okay
    </button>

    <div class="brand">
      DOCZY • Doctor at your doorstep
    </div>

  </div>

  <script>
    function goHome() {
      // change this URL as per your project
      window.location.href = "/services/";
    }
  </script>

</body>
</html>
