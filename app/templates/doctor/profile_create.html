<!DOCTYPE html>
<html>
<head>
  <title>Complete Doctor Profile | DOCZY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

  <div class="card shadow-lg rounded-4">
    <div class="card-body p-4">

      <h4 class="fw-bold mb-3 text-center">
        👨‍⚕️ Complete Your Doctor Profile
      </h4>

      <p class="text-muted text-center mb-4">
        Please complete your profile to start receiving bookings
      </p>

      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name"
                   class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Specialization</label>
            <input type="text" name="specialization"
                   class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Qualification</label>
            <input type="text" name="qualification"
                   class="form-control" placeholder="MBBS, MD" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Experience (Years)</label>
            <input type="number" name="experience_years"
                   class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Languages</label>
            <input type="text" name="languages"
                   class="form-control"
                   placeholder="English, Hindi, Gujarati" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">City</label>
            <input type="text" name="city"
                   class="form-control" required>
          </div>

          <div class="col-12">
            <label class="form-label">Short Bio</label>
            <textarea name="bio" class="form-control"
                      rows="3"></textarea>
          </div>

          <hr class="my-3">

          <h6 class="fw-bold">📄 Upload Documents (Required)</h6>

          <div class="col-md-4">
            <label class="form-label">Profile Photo</label>
            <input type="file" name="profile_photo"
                   class="form-control" accept="image/*" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Aadhaar Card</label>
            <input type="file" name="aadhaar_card"
                   class="form-control" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Degree Certificate</label>
            <input type="file" name="degree_certificate"
                   class="form-control" required>
          </div>

        </div>

        <div class="mt-4 text-center">
          <button class="btn btn-primary px-5">
            Save & Continue
          </button>
        </div>

      </form>

    </div>
  </div>

</div>

</body>
</html>
